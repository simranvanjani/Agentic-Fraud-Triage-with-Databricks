# Live Fraud Queue - Databricks App
# Analysts review and release yellow-flagged transactions in real time.

command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: PGHOST
    valueFrom: database
  - name: PGPORT
    valueFrom: database
  - name: PGDATABASE
    valueFrom: database
  - name: PGUSER
    valueFrom: database
  - name: SERVING_ENDPOINT
    value: databricks-claude-sonnet-4-5
